<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h2 { margin-bottom: 12px; }
    .preview { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
    .item { text-align: center; }
    .item label { display: block; font-size: 12px; color: #888; margin-top: 4px; }
    button {
      padding: 10px 24px; background: #ffc107; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer; color: #1a1a1a;
    }
    button:hover { background: #ffb300; }
    p.note { margin-top: 12px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h2>Unit Converter — Icon Generator</h2>
  <p>Click the button to generate and download all four required PNG icons.</p>
  <br />
  <div class="preview" id="preview"></div>
  <button onclick="generateAll()">⬇ Download all icons</button>
  <p class="note">Icons will be saved as icon16.png, icon32.png, icon48.png, icon128.png.<br>
  Place them in the <code>icons/</code> folder of the extension.</p>

  <script>
    const SIZES = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');

      const r = size * 0.18; // corner radius

      // Background
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      // Gradient fill
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#FFD600');
      grad.addColorStop(1, '#FFA000');
      ctx.fillStyle = grad;
      ctx.fill();

      // Symbol ⇄
      ctx.fillStyle = '#5a3e00';
      const fontSize = Math.round(size * 0.52);
      ctx.font = `bold ${fontSize}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⇄', size / 2, size / 2 + size * 0.04);

      return canvas;
    }

    function generateAll() {
      for (const size of SIZES) {
        const canvas = drawIcon(size);
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    }

    // Show previews
    const preview = document.getElementById('preview');
    for (const size of SIZES) {
      const canvas = drawIcon(size);
      // Show at 2x minimum for visibility
      const display = Math.max(size, 48);
      canvas.style.width = display + 'px';
      canvas.style.height = display + 'px';
      canvas.style.imageRendering = 'pixelated';
      const wrap = document.createElement('div');
      wrap.className = 'item';
      wrap.appendChild(canvas);
      const lbl = document.createElement('label');
      lbl.textContent = `${size}×${size}`;
      wrap.appendChild(lbl);
      preview.appendChild(wrap);
    }
  </script>
</body>
</html>
